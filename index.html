<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣野外蟬觀察資料庫</title>
<style>
  :root {
    --bg: #fdf8f0;
    --card-bg: #ffffff;
    --accent: #b8860b;
    --accent-light: #fff8e1;
    --text: #3e2c00;
    --muted: #8a7560;
    --border: #e0d4b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: white;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header .subtitle { font-size: .8rem; opacity: .85; }
  .header-nav { display: flex; gap: .6rem; margin-left: auto; }
  .header-nav a {
    color: rgba(255,255,255,.8); text-decoration: none;
    font-size: .82rem; padding: .2rem .65rem;
    border-radius: 999px; border: 1px solid rgba(255,255,255,.35);
  }
  .header-nav a:hover, .header-nav a.active {
    background: rgba(255,255,255,.2); color: white;
  }
  #total-badge {
    background: rgba(255,255,255,.2);
    border-radius: 999px;
    padding: .2rem .8rem;
    font-size: .85rem;
  }

  /* ── Layout ── */
  .layout { display: flex; gap: 0; }

  /* ── Sidebar / Filters ── */
  aside {
    width: 240px;
    min-width: 240px;
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    padding: 1.2rem;
    height: calc(100vh - 60px);
    overflow-y: auto;
    position: sticky;
    top: 60px;
  }
  aside h2 {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: .6rem;
  }
  #search {
    width: 100%;
    padding: .5rem .7rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .9rem;
    margin-bottom: 1.2rem;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  .filter-list { list-style: none; margin-bottom: 1.4rem; }
  .filter-list li {
    padding: .3rem .5rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: .88rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .filter-list li:hover { background: var(--accent-light); }
  .filter-list li.active { background: var(--accent); color: white; }
  .filter-list li .count {
    font-size: .75rem;
    opacity: .7;
    background: rgba(0,0,0,.08);
    border-radius: 999px;
    padding: .05rem .45rem;
  }
  .filter-list li.active .count { background: rgba(255,255,255,.2); }

  /* ── Main grid ── */
  main {
    flex: 1;
    padding: 1.2rem;
    overflow-y: auto;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 1px solid var(--border);
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.12); }
  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--accent-light);
    display: block;
  }
  .card-no-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #fff8e1, #ffe082);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .card-body { padding: .75rem; }
  .card-species {
    font-weight: 600;
    font-size: .9rem;
    color: var(--accent);
    margin-bottom: .2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-location {
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: .35rem;
  }
  .card-location::before { content: "📍 "; }
  .card-text {
    font-size: .8rem;
    line-height: 1.4;
    color: #555;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    margin-top: .5rem;
    font-size: .72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  #empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    display: none;
  }
  #empty .icon { font-size: 3rem; margin-bottom: .5rem; }

  /* ── Modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--card-bg);
    border-radius: 12px;
    max-width: 700px;
    width: 100%;
    overflow: hidden;
    position: relative;
  }
  #modal-close {
    position: absolute;
    top: .6rem;
    right: .7rem;
    background: rgba(0,0,0,.4);
    color: white;
    border: none;
    border-radius: 50%;
    width: 2rem;
    height: 2rem;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  #modal-imgs {
    display: flex;
    overflow-x: auto;
    gap: .4rem;
    background: #111;
    padding: .4rem;
    max-height: 420px;
  }
  #modal-imgs img {
    max-height: 400px;
    width: auto;
    border-radius: 6px;
    object-fit: contain;
    flex-shrink: 0;
  }
  #modal-body { padding: 1.2rem; }
  #modal-species {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: .3rem;
  }
  #modal-meta {
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: .8rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  #modal-text {
    font-size: .9rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #modal-link {
    display: inline-block;
    margin-top: .8rem;
    font-size: .82rem;
    color: var(--accent);
    text-decoration: none;
  }
  #modal-link:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    aside { display: none; }
    #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🎵 台灣野外蟬觀察資料庫</h1>
    <div class="subtitle">Facebook 蟬社團野外觀察紀錄彙整</div>
  </div>
  <nav class="header-nav">
    <a href="index.html" class="active">野外觀察紀錄</a>
    <a href="species.html">物種圖鑑</a>
  </nav>
  <div id="total-badge">— 筆</div>
</header>

<div class="layout">
  <aside>
    <h2>搜尋</h2>
    <input id="search" type="text" placeholder="搜尋物種、地點、內容...">

    <h2>物種</h2>
    <ul class="filter-list" id="species-list">
      <li class="active" data-value="" onclick="setFilter('species','',this)">
        全部 <span class="count" id="species-all-count">0</span>
      </li>
    </ul>

    <h2>地點</h2>
    <ul class="filter-list" id="location-list">
      <li class="active" data-value="" onclick="setFilter('location','',this)">
        全部 <span class="count" id="location-all-count">0</span>
      </li>
    </ul>
  </aside>

  <main>
    <div id="grid"></div>
    <div id="empty">
      <div class="icon">🔍</div>
      <div>沒有符合條件的紀錄</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-imgs"></div>
    <div id="modal-body">
      <div id="modal-species"></div>
      <div id="modal-meta"></div>
      <div id="modal-text"></div>
      <a id="modal-link" target="_blank">在 Facebook 查看原貼文 ↗</a>
    </div>
  </div>
</div>

let activeFilters = { species: "", location: "" };
let searchQuery = "";

function speciesBase(sp) {
  return sp ? sp.replace(/（[雌雄]+）$/, "").trim() : "";
}

function buildFilterLists() {
  const speciesCounts = {};
  const locationCounts = {};
  POSTS.forEach(p => {
    if (p.species) {
      const base = speciesBase(p.species);
      speciesCounts[base] = (speciesCounts[base] || 0) + 1;
    }
    if (p.location) locationCounts[p.location] = (locationCounts[p.location] || 0) + 1;
  });

  const sList = document.getElementById("species-list");
  document.getElementById("species-all-count").textContent = POSTS.length;
  Object.entries(speciesCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("species", name, li);
      sList.appendChild(li);
    });

  const lList = document.getElementById("location-list");
  document.getElementById("location-all-count").textContent = POSTS.length;
  Object.entries(locationCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("location", name, li);
      lList.appendChild(li);
    });
}

function setFilter(type, value, el) {
  activeFilters[type] = value;
  const list = type === "species"
    ? document.getElementById("species-list")
    : document.getElementById("location-list");
  list.querySelectorAll("li").forEach(li => li.classList.remove("active"));
  el.classList.add("active");
  renderGrid();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return POSTS.filter(p => {
    if (activeFilters.species && speciesBase(p.species) !== activeFilters.species) return false;
    if (activeFilters.location && p.location !== activeFilters.location) return false;
    if (q) {
      const haystack = [p.species, p.location, p.text, p.author].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const posts = getFiltered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("total-badge").textContent = `${posts.length} 筆`;

  if (posts.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = posts.map((p, i) => {
    const imgHtml = p.images && p.images.length
      ? `<img class="card-img" src="images/${p.images[0]}" loading="lazy" alt="">`
      : `<div class="card-no-img">🎵</div>`;
    const ts = p.timestamp ? p.timestamp.slice(0, 10) : "";
    return `
      <div class="card" onclick="openModal(${POSTS.indexOf(p)})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-species">${p.species || "（物種未知）"}</div>
          ${p.location ? `<div class="card-location">${p.location}</div>` : ""}
          <div class="card-text">${p.text || ""}</div>
          <div class="card-meta">
            <span>${p.author || ""}</span>
            <span>${ts}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

function openModal(idx) {
  const p = POSTS[idx];
  document.getElementById("modal-species").textContent = p.species || "（物種未知）";
  document.getElementById("modal-meta").innerHTML = [
    p.location ? `📍 ${p.location}` : "",
    p.author   ? `👤 ${p.author}`   : "",
    p.timestamp ? `🗓 ${p.timestamp.slice(0,10)}` : "",
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");
  document.getElementById("modal-text").textContent = p.text || "";
  const link = document.getElementById("modal-link");
  link.href = p.post_url || "#";
  link.style.display = p.post_url ? "inline-block" : "none";

  const imgs = document.getElementById("modal-imgs");
  imgs.innerHTML = (p.images || []).map(fn =>
    `<img src="images/${fn}" alt="">`
  ).join("");
  imgs.style.display = (p.images || []).length ? "flex" : "none";

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target.id !== "modal-close") return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

buildFilterLists();
renderGrid();
</script>
