<style>
  :root {
    --bg: #fdf8f0;
    --card-bg: #fff;
    --accent: #b8860b;
    --accent-light: #fff8e1;
    --accent2: #7b5800;
    --text: #3e2c00;
    --muted: #8a7560;
    --border: #e0d4b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); }

  header {
    background: var(--accent); color: white;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: 1.5rem;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.15rem; font-weight: 700; }
  header .subtitle { font-size: .78rem; opacity: .8; }
  nav.header-nav { margin-left: auto; display: flex; gap: .8rem; }
  nav.header-nav a {
    color: rgba(255,255,255,.85); text-decoration: none;
    font-size: .85rem; padding: .25rem .7rem;
    border-radius: 999px; border: 1px solid rgba(255,255,255,.4);
    transition: background .15s;
  }
  nav.header-nav a:hover, nav.header-nav a.active { background: rgba(255,255,255,.2); color: white; }
  .save-btn {
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.5);
    color: white; padding: .28rem .85rem; border-radius: 999px;
    font-size: .82rem; cursor: pointer; transition: background .15s;
  }
  .save-btn:hover { background: rgba(255,255,255,.3); }
  .save-toast {
    position: fixed; bottom: 1.2rem; right: 1.2rem;
    background: #b8860b; color: white; padding: .6rem 1.1rem;
    border-radius: 8px; font-size: .85rem; display: none;
    box-shadow: 0 3px 10px rgba(0,0,0,.2); z-index: 999;
  }

  .layout { display: flex; }
  aside {
    width: 220px; min-width: 220px;
    background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 1rem .8rem;
    height: calc(100vh - 58px); overflow-y: auto;
    position: sticky; top: 58px;
  }
  aside h2 { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .5rem; }
  .sp-nav-list { list-style: none; }
  .sp-nav-list li a {
    display: flex; justify-content: space-between; align-items: center;
    padding: .3rem .5rem; border-radius: 6px;
    text-decoration: none; color: var(--text); font-size: .85rem;
    transition: background .12s;
  }
  .sp-nav-list li a:hover { background: var(--accent-light); }
  .sp-nav-list li a.active { background: var(--accent); color: white; }
  .sp-nav-list li a .cnt {
    font-size: .72rem; background: rgba(0,0,0,.08);
    border-radius: 999px; padding: .05rem .4rem;
  }
  .sp-nav-list li a.active .cnt { background: rgba(255,255,255,.25); }

  main { flex: 1; padding: 1.2rem; overflow-y: auto; }

  .sp-section {
    background: var(--card-bg);
    border-radius: 12px; border: 1px solid var(--border);
    margin-bottom: 2rem; overflow: hidden;
    scroll-margin-top: 70px;
  }
  .sp-header {
    padding: 1.2rem 1.4rem;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 1rem; align-items: flex-start;
  }
  .sp-name { font-size: 1.5rem; font-weight: 700; color: var(--accent2); }
  .sp-latin { font-size: .9rem; color: var(--muted); font-style: italic; margin-top: .15rem; }
  .sp-badges { display: flex; gap: .5rem; margin-top: .5rem; flex-wrap: wrap; }
  .badge {
    display: inline-block; padding: .15rem .55rem;
    border-radius: 999px; font-size: .72rem;
    background: var(--accent-light); color: var(--accent2);
    border: 1px solid #e0c060;
  }
  .sp-count-badge {
    margin-left: auto; text-align: right; white-space: nowrap;
    font-size: .85rem; color: var(--muted);
    min-width: 70px;
  }
  .sp-count-badge strong { display: block; font-size: 1.8rem; color: var(--accent); }

  .sp-gallery {
    display: flex; gap: 4px; overflow-x: auto;
    padding: 0; background: #111;
    max-height: 280px;
  }
  .sp-gallery img {
    height: 260px; width: auto;
    object-fit: cover; flex-shrink: 0;
    cursor: pointer;
  }
  .no-photo {
    display: flex; align-items: center; justify-content: center;
    height: 140px; background: var(--accent-light);
    font-size: 3rem;
  }

  .sp-body { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 1.4rem; }
  .sp-section-label {
    font-size: .7rem; text-transform: uppercase; letter-spacing: .07em;
    color: var(--muted); margin-bottom: .6rem; font-weight: 700;
    display: flex; align-items: center; gap: .35rem;
  }

  .my-note {
    width: 100%; min-height: 90px;
    padding: .75rem 1rem;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: .9rem; line-height: 1.7;
    color: var(--text); background: #fdfaf5;
    resize: vertical; transition: border-color .15s, box-shadow .15s;
  }
  .my-note:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(184,134,11,.1); background: white;
  }
  .my-note::placeholder { color: #c4b08a; }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: .55rem;
  }
  .note-item {
    padding: .6rem .85rem; border-radius: 8px;
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    font-size: .85rem; line-height: 1.65; color: var(--text);
  }
  .no-notes { font-size: .85rem; color: var(--muted); font-style: italic; }

  .loc-tags { display: flex; flex-wrap: wrap; gap: .4rem; }
  .loc-tag {
    display: inline-flex; align-items: center; gap: .25rem;
    padding: .22rem .65rem;
    background: white; border: 1px solid var(--border);
    border-radius: 999px; font-size: .8rem; color: var(--text);
  }
  .loc-tag::before { content: "📍"; font-size: .75rem; }

  .records-row { display: flex; gap: .5rem; overflow-x: auto; padding-bottom: .5rem; }
  .records-row::-webkit-scrollbar { height: 4px; }
  .records-row::-webkit-scrollbar-track { background: var(--bg); border-radius: 2px; }
  .records-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .rec-mini {
    min-width: 120px; max-width: 120px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; background: white;
    text-decoration: none; color: var(--text); display: block;
    transition: box-shadow .12s, transform .12s;
  }
  .rec-mini:hover { box-shadow: 0 3px 10px rgba(0,0,0,.13); transform: translateY(-1px); }
  .rec-mini img { width: 100%; height: 78px; object-fit: cover; display: block; }
  .rec-mini-noimg { width: 100%; height: 78px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  .rec-mini-body { padding: .38rem .45rem; font-size: .71rem; color: var(--muted); }
  .rec-mini-body strong { display: block; color: var(--text); margin-bottom: .1rem; font-size: .76rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .expert-notes-list { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
  .expert-notes-list li {
    background: #fffbe8; border-left: 3px solid #c8960f;
    padding: .45rem .85rem; border-radius: 0 6px 6px 0;
    font-size: .88rem; line-height: 1.6;
  }
  .expert-sources { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .55rem; }
  .expert-sources a {
    font-size: .75rem; color: #7b5800;
    background: #fff3cc; border: 1px solid #e0c060;
    border-radius: 999px; padding: .15rem .6rem;
    text-decoration: none;

        justify-content:center; align-items:center; }
  #lb.open { display:flex; }
  #lb img { max-width:92vw; max-height:90vh; border-radius:6px; object-fit:contain; }
  #lb-close { position:fixed; top:1rem; right:1.2rem; color:white; font-size:2rem; cursor:pointer; }
</style>

const SAVED_NOTES = {};

function buildNav() {
  const nav = document.getElementById("sp-nav");
  SPECIES.forEach((sp, i) => {
    const li = document.createElement("li");
    li.innerHTML = `<a href="#sp-${i}">
      ${sp.name} <span class="cnt">${sp.count}</span>
    </a>`;
    nav.appendChild(li);
  });
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll(".sp-nav-list a").forEach(a => {
          a.classList.toggle("active", a.getAttribute("href") === "#" + id);
        });
      }
    });
  }, { threshold: 0.3 });
  document.querySelectorAll(".sp-section").forEach(s => observer.observe(s));
}

function buildSections() {
  const main = document.getElementById("main-content");
  main.innerHTML = SPECIES.map((sp, i) => {
    const galleryHtml = sp.photos.length
      ? sp.photos.map(fn => `<img src="images/${fn}" onclick="openLb(this.src)" alt="${sp.name}">`).join("")
      : `<div class="no-photo">🎵</div>`;

    const notesHtml = sp.notes.length
      ? `<div class="notes-grid">${sp.notes.map(n => `<div class="note-item">${escHtml(n)}</div>`).join("")}</div>`
      : `<p class="no-notes">目前尚無社群識別筆記</p>`;

    const locsHtml = sp.locations.length
      ? sp.locations.map(l => `<span class="loc-tag">${l}</span>`).join("")
      : `<span class="no-notes">—</span>`;

    const recsHtml = sp.records.map(r => {
      const imgPart = r.img
        ? `<img src="images/${r.img}" alt="" onerror="this.parentNode.innerHTML='<div class=rec-mini-noimg>🎵</div>'">`
        : `<div class="rec-mini-noimg">🎵</div>`;
      return `<a class="rec-mini" href="${r.post_url}" target="_blank">
        ${imgPart}
        <div class="rec-mini-body">
          <strong>${escHtml(r.author.replace(/\\s*·\\s*追蹤$/, ""))}</strong>
          ${escHtml((r.text_preview || "").slice(0, 35))}
        </div>
      </a>`;
    }).join("");

    const noteBadge = sp.note ? `<span class="badge">${sp.note}</span>` : "";
    const familyBadge = sp.family ? `<span class="badge">${sp.family}</span>` : "";

    const expertHtml = sp.expert_notes && sp.expert_notes.length ? `
      <div>
        <div class="sp-section-label">🎯 專家辨識要點</div>
        <ul class="expert-notes-list">${sp.expert_notes.map(n => `<li>${n}</li>`).join("")}</ul>
        ${sp.expert_sources && sp.expert_sources.length ? `<div class="expert-sources">${sp.expert_sources.map(([label, url]) => `<a href="${url}" target="_blank" rel="noopener">${escHtml(label)}</a>`).join("")}</div>` : ""}
      </div>` : "";

    return `
    <section class="sp-section" id="sp-${i}">
      <div class="sp-header">
        <div>
          <div class="sp-name">${sp.name}</div>
          <div class="sp-latin">${sp.latin || ""}</div>
          <div class="sp-badges">${familyBadge}${noteBadge}</div>
        </div>
        <div class="sp-count-badge">
          <strong>${sp.count}</strong>筆紀錄
        </div>
      </div>

      <div class="sp-gallery">${galleryHtml}</div>

      <div class="sp-body">

        ${expertHtml}

        <div>
          <div class="sp-section-label">✏️ 我的筆記</div>
          <textarea class="my-note" data-sp="${escHtml(sp.name)}"
            placeholder="點此輸入你的觀察筆記、導覽解說重點、生態習性…（自動儲存在此瀏覽器）"></textarea>
        </div>

        <div>
          <div class="sp-section-label">🔍 社群識別筆記</div>
          ${notesHtml}
        </div>

        <div>
          <div class="sp-section-label">📍 常見觀察地點</div>
          <div class="loc-tags">${locsHtml}</div>
        </div>

        ${sp.records.length ? `
        <div>
          <div class="sp-section-label">📋 觀察紀錄</div>
          <div class="records-row">${recsHtml}</div>
        </div>` : ""}

      </div>
    </section>`;
  }).join("");

  document.querySelectorAll(".my-note").forEach(ta => {
    const key = "mynote:" + ta.dataset.sp;
    ta.value = localStorage.getItem(key) ?? SAVED_NOTES[ta.dataset.sp] ?? "";
    ta.addEventListener("input", () => localStorage.setItem(key, ta.value));
  });
}

function exportNotes() {
  const notes = {};
  document.querySelectorAll(".my-note").forEach(ta => {
    if (ta.value.trim()) notes[ta.dataset.sp] = ta.value;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "species_notes.json";
  a.click();
  const toast = document.getElementById("toast");
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 6000);
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function openLb(src) {
  document.getElementById("lb-img").src = src;
  document.getElementById("lb").classList.add("open");
}
function closeLb() { document.getElementById("lb").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLb(); });

buildSections();
buildNav();
</script>
