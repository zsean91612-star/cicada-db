<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蟬物種辨識測驗</title>
<style>
  :root {
    --bg: #f5f7f2;
    --card: #fff;
    --accent: #2e7d32;
    --accent-light: #e8f5e9;
    --accent2: #1b5e20;
    --text: #2c3e2d;
    --muted: #6c7e6d;
    --border: #d0dbd1;
    --correct: #2e7d32;
    --wrong: #c62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Noto Sans TC",sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--accent); color: white;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: 1.5rem;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.15rem; font-weight: 700; }
  header .subtitle { font-size: .78rem; opacity: .8; }
  nav.header-nav { margin-left: auto; display: flex; gap: .8rem; flex-wrap: wrap; }
  nav.header-nav a {
    color: rgba(255,255,255,.85); text-decoration: none;
    font-size: .85rem; padding: .25rem .7rem;
    border-radius: 999px; border: 1px solid rgba(255,255,255,.4);
    transition: background .15s;
  }
  nav.header-nav a:hover { background: rgba(255,255,255,.2); }
  nav.header-nav a.active { background: rgba(255,255,255,.2); color: white; }

  .quiz-wrap { max-width: 680px; margin: 2rem auto; padding: 0 1rem 3rem; }

  .score-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.2rem;
    background: var(--card); border-radius: 12px; padding: .7rem 1.1rem;
    border: 1px solid var(--border); font-size: .9rem;
  }
  .score-bar .s-label { color: var(--muted); }
  .score-bar .s-num { font-weight: 700; font-size: 1.1rem; color: var(--accent2); }
  .streak { color: #e65100; font-weight: 600; }

  .q-card {
    background: var(--card); border-radius: 16px;
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }
  .q-img-wrap {
    position: relative; background: #111;
    display: flex; align-items: center; justify-content: center;
    min-height: 320px; max-height: 440px; overflow: hidden;
    cursor: zoom-in;
  }
  .q-img-wrap img { width: 100%; max-height: 440px; object-fit: contain; display: block; }
  .q-num {
    position: absolute; top: .8rem; left: .8rem;
    background: rgba(0,0,0,.55); color: white;
    font-size: .78rem; padding: .2rem .65rem; border-radius: 999px;
  }
  .zoom-hint {
    position: absolute; bottom: .7rem; right: .8rem;
    background: rgba(0,0,0,.45); color: rgba(255,255,255,.85);
    font-size: .72rem; padding: .15rem .55rem; border-radius: 999px;
    pointer-events: none;
  }

  .q-body { padding: 1.3rem; }
  .q-prompt { font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
  .choice-btn {
    padding: .75rem 1rem;
    border: 2px solid var(--border); border-radius: 10px;
    background: white; color: var(--text);
    font-size: .92rem; font-family: inherit;
    cursor: pointer; text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
    line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct  { border-color: var(--correct); background: #e8f5e9; color: var(--correct); font-weight: 600; }
  .choice-btn.wrong    { border-color: var(--wrong);   background: #ffebee; color: var(--wrong); }
  .choice-btn.dimmed   { opacity: .45; }

  .result-box {
    margin-top: 1.1rem; padding: 1rem 1.1rem;
    border-radius: 12px; display: none;
    animation: fadeIn .25s ease;
  }
  .result-box.show { display: block; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

  .result-verdict {
    font-size: 1.1rem; font-weight: 700; margin-bottom: .7rem;
    display: flex; align-items: center; gap: .4rem;
  }
  .result-verdict.ok  { color: var(--correct); }
  .result-verdict.bad { color: var(--wrong); }

  .result-expert {
    background: #fff8e1; border-left: 3px solid #f9a825;
    border-radius: 8px; padding: .75rem 1rem; margin-bottom: .75rem;
  }
  .result-expert h4 { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: #8a6d00; margin-bottom: .5rem; }
  .result-expert ul { list-style: none; display: flex; flex-direction: column; gap: .35rem; }
  .result-expert li { font-size: .88rem; line-height: 1.65; padding-left: .9rem; position: relative; }
  .result-expert li::before { content: "→"; position: absolute; left: 0; color: #f9a825; font-weight: 700; }
  .result-expert .src { font-size: .74rem; color: #8a6d00; margin-top: .4rem; }
  .no-expert { font-size: .85rem; color: var(--muted); font-style: italic; margin-bottom: .75rem; }

  .result-actions { display: flex; gap: .7rem; flex-wrap: wrap; margin-top: .9rem; }
  .btn-post {
    display: inline-flex; align-items: center; gap: .35rem;
    padding: .5rem 1rem; border-radius: 8px;
    background: white; border: 1.5px solid var(--border);
    color: var(--text); text-decoration: none; font-size: .85rem;
    transition: border-color .15s, background .15s;
  }
  .btn-post:hover { border-color: var(--accent); background: var(--accent-light); }
  .btn-next {
    padding: .55rem 1.4rem; border-radius: 8px;
    background: var(--accent); color: white;
    border: none; font-size: .92rem; font-family: inherit;
    cursor: pointer; font-weight: 600; flex: 1;
    transition: background .15s, transform .1s;
  }
  .btn-next:hover { background: var(--accent2); transform: translateY(-1px); }

  #lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:500;
        justify-content:center; align-items:center; cursor:zoom-out; }
  #lb.open { display:flex; }
  #lb img { max-width:95vw; max-height:93vh; object-fit:contain; border-radius:6px; }
  #lb-close { position:fixed; top:1rem; right:1.2rem; color:white; font-size:2rem; cursor:pointer; }

  @media (max-width: 480px) {
    .choices { grid-template-columns: 1fr; }
    .q-img-wrap { min-height: 240px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🌿 台灣蟬觀察資料庫</h1>
    <div class="subtitle">台灣蟬保育學會社團野外紀錄</div>
  </div>
  <nav class="header-nav">
    <a href="index.html">野外觀察紀錄</a>
    <a href="species.html">物種圖鑑</a>
    <a href="quiz.html" class="active">物種測驗</a>
  </nav>
</header>

<div class="quiz-wrap">
  <div class="score-bar">
    <span class="s-label">答對 / 已答</span>
    <span>
      <span class="s-num" id="score-correct">0</span>
      <span class="s-label"> / </span>
      <span class="s-num" id="score-total">0</span>
    </span>
    <span class="streak" id="streak-label"></span>
    <button onclick="resetQuiz()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:.3rem .8rem;cursor:pointer;font-size:.82rem;color:var(--muted);">重置</button>
  </div>

  <div class="q-card">
    <div class="q-img-wrap" id="q-img-wrap" onclick="openLb()">
      <img id="q-img" src="" alt="辨識照片">
      <span class="q-num" id="q-num">#1</span>
      <span class="zoom-hint">🔍 點擊放大</span>
    </div>
    <div class="q-body">
      <div class="q-prompt">這是哪一種蟬？</div>
      <div class="choices" id="choices"></div>
      <div class="result-box" id="result-box">
        <div class="result-verdict" id="verdict"></div>
        <div id="expert-block"></div>
        <div class="result-actions">
          <a class="btn-post" id="btn-post" href="#" target="_blank">📋 查看原貼文</a>
          <button class="btn-next" onclick="nextQuestion()">下一題 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="lb" onclick="closeLb()">
  <span id="lb-close" onclick="closeLb()">✕</span>
  <img id="lb-img" src="" alt="">
</div>

const SPECIES_LIST = ["北埔姬春蟬", "可禮大蟬", "台灣姬蟬", "台灣暗蟬", "台灣熊蟬", "台灣爺蟬", "台灣虎翅蟬", "台灣騷蟬", "大坪暮蟬", "太平姬春蟬", "姬春蟬屬", "寒蟬屬", "小暮蟬", "小蟪蛄", "岩崎寒蟬", "平山氏草蟬", "暮蟬屬", "渡邊幽蟬", "熊蟬屬", "端黑蟬", "紅脈熊蟬", "紋翅暮蟬", "細蟬", "草蟬", "蓬萊大蟬", "薄翅蟬", "蝦夷蟬屬", "蟪蛄", "蟪蛄屬", "長毛蟪蛄", "陽明山暮蟬", "青面姬春蟬", "高士佛姬春蟬", "高山姬春蟬", "高山草蟬", "高砂熊蟬", "鱉甲暮蟬", "黃蟪蛄", "黑翅草蟬"];

let pool = [], current = null, questionNum = 0;
let correct = 0, total = 0, streak = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetQuiz() {
  pool = shuffle([...ITEMS]);
  correct = 0; total = 0; streak = 0; questionNum = 0;
  updateScore();
  nextQuestion();
}

function nextQuestion() {
  if (pool.length === 0) pool = shuffle([...ITEMS]);
  current = pool.pop();
  questionNum++;
  answered = false;

  document.getElementById("q-img").src = "images/" + current.image;
  document.getElementById("lb-img").src = "images/" + current.image;
  document.getElementById("q-num").textContent = "#" + questionNum;
  document.getElementById("result-box").classList.remove("show");

  const distractors = shuffle(SPECIES_LIST.filter(s => s !== current.species)).slice(0, 3);
  const choices = shuffle([current.species, ...distractors]);

  document.getElementById("choices").innerHTML = choices.map(sp =>
    `<button class="choice-btn" onclick="submitAnswer(${JSON.stringify(sp)})">${sp}</button>`
  ).join("");
}

function submitAnswer(chosen) {
  if (answered) return;
  answered = true;
  total++;
  const isCorrect = chosen === current.species;
  if (isCorrect) { correct++; streak++; } else { streak = 0; }
  updateScore();

  document.querySelectorAll(".choice-btn").forEach(btn => {
    btn.disabled = true;
    const txt = btn.textContent.trim();
    if (txt === current.species) btn.classList.add("correct");
    else if (txt === chosen && !isCorrect) btn.classList.add("wrong");
    else btn.classList.add("dimmed");
  });

  const verdict = document.getElementById("verdict");
  verdict.className = "result-verdict " + (isCorrect ? "ok" : "bad");
  verdict.innerHTML = isCorrect
    ? `✅ 答對了！是<strong>${current.species}</strong>`
    : `❌ 答錯了，正解是<strong>${current.species}</strong>`;

  const eb = document.getElementById("expert-block");
  if (current.expert_notes && current.expert_notes.length) {
    const srcHtml = current.expert_sources && current.expert_sources.length
      ? `<div class="src">來源：${current.expert_sources.join("、")}</div>` : "";
    eb.innerHTML = `<div class="result-expert">
      <h4>🎯 辨識要點</h4>
      <ul>${current.expert_notes.map(n => `<li>${n}</li>`).join("")}</ul>
      ${srcHtml}
    </div>`;
  } else {
    eb.innerHTML = `<p class="no-expert">此物種尚無專家辨識要點。</p>`;
  }

  document.getElementById("btn-post").href = current.post_url || "#";
  document.getElementById("result-box").classList.add("show");
}

function updateScore() {
  document.getElementById("score-correct").textContent = correct;
  document.getElementById("score-total").textContent = total;
  const sl = document.getElementById("streak-label");
  sl.textContent = streak >= 3 ? `🔥 連對 ${streak} 題！` : streak >= 2 ? `連對 ${streak} 題` : "";
}

function openLb() {
  document.getElementById("lb-img").src = "images/" + current.image;
  document.getElementById("lb").classList.add("open");
}
function closeLb() { document.getElementById("lb").classList.remove("open"); }
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeLb();
  if ((e.key === "Enter" || e.key === " ") && answered) { e.preventDefault(); nextQuestion(); }
});

resetQuiz();
</script>
